services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: valinc-postgres
    environment:
      POSTGRES_DB: valinc_syndicate
      POSTGRES_USER: valinc_user
      POSTGRES_PASSWORD: valinc_password_change_in_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valinc_user -d valinc_syndicate"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Local Redis Cache
  redis:
    image: redis:7-alpine
    container_name: valinc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Express Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: valinc-backend
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Override localhost → Docker service name so containers can communicate
      - REDIS_HOST=valinc-redis
      - DB_HOST=valinc-postgres
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.vinzhub.com
        - INTERNAL_BACKEND_URL=http://valinc-backend:5000
    container_name: valinc-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Discord Bot Service
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: valinc-bot
    env_file:
      - ./bot/.env
    environment:
      # Bot communicates with backend via internal Docker network
      - BACKEND_INTERNAL_URL=http://valinc-backend:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
