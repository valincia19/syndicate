services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vinzhub-postgres
    environment:
      POSTGRES_DB: vinzhub
      POSTGRES_USER: vinzhub_user
      POSTGRES_PASSWORD: vinzhub_password_change_in_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinzhub_user -d vinzhub"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
