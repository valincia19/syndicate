services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: valinc-postgres
    environment:
      POSTGRES_DB: valinc_syndicate
      POSTGRES_USER: valinc_user
      POSTGRES_PASSWORD: valinc_password_change_in_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valinc_user -d valinc_syndicate"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
